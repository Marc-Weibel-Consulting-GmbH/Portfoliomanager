[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Railway sets $PORT dynamically — override the Dockerfile CMD to use it
startCommand = "tradingview-mcp streamable-http --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
